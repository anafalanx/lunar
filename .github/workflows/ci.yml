name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python

      # The shipped product is the Tcl/Tk shell (see tools/tasks.tcl), which
      # links a static Tcl/Tk 9 payload that isn't available on hosted
      # runners -- so CI can't produce the exe. It exercises what it can:
      # run_tests.py compiles the vendored mbedTLS archive and the full C
      # engine from source, then runs the unit-test suite against it.
      - name: Engine unit tests
        run: python tests/run_tests.py
