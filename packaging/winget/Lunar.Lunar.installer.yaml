# Installer manifest (template). Replace {VERSION} and {SHA256} before
# submitting. Lunar ships as a single signed portable exe; {SHA256} is
# the SHA-256 of the release Lunar.exe (release.py / signtool print it,
# or:  certutil -hashfile Lunar.exe SHA256).
# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
PackageIdentifier: Lunar.Lunar
PackageVersion: "{VERSION}"
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.0.0
InstallerType: portable
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/anafalanx/lunar/releases/download/v{VERSION}/Lunar.exe
    InstallerSha256: "{SHA256}"
    PortableCommandAlias: lunar
ManifestType: installer
ManifestVersion: 1.6.0
