# Installer manifest (template). Replace {VERSION} and {SHA256} before
# submitting. {SHA256} is the hash of the release ZIP (release.py prints
# the exe hash; compute the zip hash with:  certutil -hashfile <zip> SHA256).
# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
PackageIdentifier: Lunar.Lunar
PackageVersion: "{VERSION}"
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.0.0
InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
  - RelativeFilePath: Lunar.exe
    PortableCommandAlias: lunar
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/anafalanx/lunar/releases/download/v{VERSION}/Lunar-{VERSION}-win-x64.zip
    InstallerSha256: "{SHA256}"
ManifestType: installer
ManifestVersion: 1.6.0
