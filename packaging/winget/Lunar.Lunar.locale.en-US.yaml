ShortDescription: A trusted-time dashboard for Windows.
Description: >-
  Lunar is a minimalist digital time dashboard for Windows. It keeps its
  own cryptographically-attested timescale — disciplined by authenticated
  NTS consensus, never the OS clock — and shows the true time, how certain
  it is, and when your PC's own clock is wrong. A single self-contained,
  Authenticode-signed executable (C engine + statically-linked Tcl/Tk):
  no installer, no runtime dependencies.
